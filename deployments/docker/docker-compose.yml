version: '3.8'

services:
  gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - LLM_APP_ENV=prod
      - LLM_REDIS_ADDR=redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      - redis
      - postgres
    networks:
      - llm-gateway

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=llm_gateway
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-llm_gateway_dev}
      - POSTGRES_DB=llm_gateway
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - llm-gateway

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - llm-gateway

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - llm-gateway

volumes:
  redis-data:
  postgres-data:

networks:
  llm-gateway:
    driver: bridge
