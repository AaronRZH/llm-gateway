app:
  env: "prod"
  port: 8080
# 调试开关：生产环境保持关闭，避免暴露 /debug/pprof
debug:
  pprof_enabled: false
  pprof_port: 6060

# 流式转发配置
stream:
  idle_timeout: 120s # 上游读取空闲超时：超过该时间未收到数据判定上游 stall 并终止流，避免客户端看到流"中途卡住"
log:
  level: "warn"

redis:
  addr: "redis:6379"

postgres:
  host: "postgres"
  port: 5432
  user: "llm_gateway"
  password: "${POSTGRES_PASSWORD}"
  database: "llm_gateway"
  ssl_mode: "require"
  max_conns: 50
  min_conns: 5
  conn_timeout: 10s

rate_limit:
  requests_per_second: 1000
  burst: 1500
