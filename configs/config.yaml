app:
  name: "llm-gateway"
  version: "1.0.0"
  env: "dev" # dev | prod
  port: 8080

log:
  level: "info" # debug | info | warn | error
  format: "json" # json | console
  output: "stdout" # stdout | file path

# Redis 配置
redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 10
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

# 模型名 allowlist（对外暴露）
models:
  - "gpt-4"
  - "gpt-4-mini"
  - "claude"
  - "deepseek"
  - "deepseek-v4-pro"

# provider 和 model 必须是真实存在的
real_models:
  strategy: "latency_optimized" # priority | round_robin | latency_optimized | cost_optimized
  models:
    - provider: "anthropic"
      model: "Qwen3.6-35B-A3B-4bit"
      weight: 70
      timeout: 3000s
      cost: 0
    - provider: "openai"
      model: "Qwen3.6-35B-A3B-4bit"
      weight: 50
      timeout: 3000s
      cost: 0
    - provider: "deepseek_anthropic"
      model: "deepseek-v4-flash"
      weight: 10
      timeout: 3000s
      cost: 0.03
    - provider: "seneenova"
      model: "sensenova-6.7-flash-lite"
      weight: 70
      timeout: 3000s
      cost: 0

# 熔断器配置
circuit_breaker:
  max_requests: 3 # 半开状态允许试探请求数
  interval: 10s # 统计周期
  timeout: 5s # 请求超时
  failure_threshold: 5 # 连续失败次数触发熔断
  cooldown: 30s # 熔断后冷却时间

# 限流配置
rate_limit:
  enabled: true
  requests_per_second: 100
  burst: 150

# Provider 配置（API Keys 建议通过环境变量注入）
# provider name 仅作路由标识，不影响行为
# protocol 字段：声明上游使用的协议类型（"openai" | "anthropic"）
# 默认为 "openai"
# 默认上游路径：anthropic → /messages，其他 → /chat/completions
# endpoint 字段可覆盖默认路径
providers:
  openai:
    base_url: "http://192.168.31.238:8000/v1"
    api_key: "${ANTHROPIC_AUTH_TOKEN}"
    timeout: 3000s
    protocol: "openai" # 上游是 OpenAI 兼容接口
  seneenova:
    base_url: "https://token.sensenova.cn/v1"
    api_key: "${SENSENOVA_AUTH_TOKEN}"
    timeout: 3000s
    protocol: "openai" # 上游是 OpenAI 兼容接口
  anthropic:
    base_url: "http://192.168.31.238:8000/v1"
    api_key: "${ANTHROPIC_AUTH_TOKEN}"
    timeout: 3000s
    protocol: "anthropic" # 上游是 Anthropic 兼容接口
  deepseek_openai:
    base_url: "https://api.deepseek.com"
    api_key: "${DEEPSEEK_API_KEY}"
    timeout: 3000s
    protocol: "openai" # 上游是 OpenAI 兼容接口
  deepseek_anthropic:
    base_url: "https://api.deepseek.com/anthropic"
    api_key: "${DEEPSEEK_API_KEY}"
    timeout: 3000s
    protocol: "anthropic" # 上游是 Anthropic 兼容接口

token:
  # 本地估算模型映射
  tokenizer_mapping:
    "gpt-4o-2024-11-20": "cl100k_base"
    "gpt-4o-mini-2024-07-18": "cl100k_base"
    "claude-3-5-sonnet-20241022": "claude"
    "deepseek-chat": "deepseek"

# 监控
metrics:
  enabled: true
  path: "/metrics"

# 健康检查
health:
  enabled: true
  path: "/health"

# API Key 配置（种子 Key，自动同步到 Redis）
# 生产环境建议通过 Redis 动态管理
api_keys:
  - key: "sk-gateway-dev-key-001"
    name: "dev-client-1"
  - key: "sk-gateway-dev-key-002"
    name: "dev-client-2"

# Auth 白名单路径（Auth 中间件会跳过这些路径的验证）
auth_whitelist:
  - "/health"
  - "/metrics"
  - "/v1/usage/*"
  - "/v1/admin/*"
