app:
  name: "llm-gateway"
  version: "1.0.0"
  env: "dev" # dev | prod
  port: 8080

log:
  level: "info" # debug | info | warn | error
  format: "json" # json | console
  output: "stdout" # stdout | file path

# Redis 配置
redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 10
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

# 模型名映射
model_mapping:
  # 对外暴露名 -> 内部真实模型
  virtual_to_real:
    "gpt-4":
      real: "anthropic/Qwen3.6-35B-A3B-4bit"
      aliases: ["gpt-4o"]
    "gpt-4-mini":
      real: "anthropic/Qwen3.6-35B-A3B-4bit"
      aliases: ["gpt-4o-mini"]
    "claude":
      real: "anthropic/Qwen3.6-35B-A3B-4bit"
      aliases: ["claude-sonnet", "claude"]
    "deepseek":
      real: "anthropic/Qwen3.6-35B-A3B-4bit"
      aliases: ["deepseek-v3"]

  # 反向映射（响应重写用，你的代理模型名含.导致Viper解析异常，先注释）
  # "anthropic/Qwen3.6-35B-A3B-4bit": "Qwen3.6-35B-A3B-4bit"

# 模型组 & 自动切换策略
model_groups:
  "smart-chat":
    strategy: "round_robin" # priority | round_robin | latency_optimized | cost_optimized
    fallback_chain:
      - provider: "openai"
        model: "Qwen3.6-35B-A3B-4bit"
        weight: 70
        timeout: 3000s
        retry: 2
        cost: 0.03
      - provider: "anthropic"
        model: "Qwen3.6-35B-A3B-4bit"
        weight: 30
        timeout: 3000s
        retry: 1
        cost: 0.015
      - provider: "deepseek"
        model: "Qwen3.6-35B-A3B-4bit"
        weight: 0
        timeout: 3000s
        retry: 1
        cost: 0.001

  "fast-chat":
    strategy: "latency_optimized"
    fallback_chain:
      - provider: "openai"
        model: "Qwen3.6-35B-A3B-4bit"
        weight: 50
        timeout: 3000s
        cost: 0.0006
      - provider: "deepseek"
        model: "Qwen3.6-35B-A3B-4bit"
        weight: 50
        timeout: 3000s

# 熔断器配置
circuit_breaker:
  max_requests: 3 # 半开状态允许试探请求数
  interval: 10s # 统计周期
  timeout: 5s # 请求超时
  failure_threshold: 5 # 连续失败次数触发熔断
  cooldown: 30s # 熔断后冷却时间

# 限流配置
rate_limit:
  enabled: true
  requests_per_second: 100
  burst: 150

# Provider 配置（API Keys 建议通过环境变量注入）
providers:
  openai:
    base_url: "http://192.168.31.238:8000/v1"
    api_key: "${ANTHROPIC_AUTH_TOKEN}"
    timeout: 3000s
  anthropic:
    base_url: "http://192.168.31.238:8000/v1"
    api_key: "${ANTHROPIC_AUTH_TOKEN}"
    timeout: 3000s
  deepseek:
    base_url: "http://192.168.31.238:8000/v1"
    api_key: "${ANTHROPIC_AUTH_TOKEN}"
    timeout: 3000s

# Token 计算
token:
  # 本地估算模型映射
  tokenizer_mapping:
    "gpt-4o-2024-11-20": "cl100k_base"
    "gpt-4o-mini-2024-07-18": "cl100k_base"
    "claude-3-5-sonnet-20241022": "claude"
    "deepseek-chat": "deepseek"

  # 官网同步配置
  official_sync:
    enabled: true
    interval: 5m
    batch_size: 100

# 监控
metrics:
  enabled: true
  path: "/metrics"
  port: 9090

# 健康检查
health:
  enabled: true
  path: "/health"

# API Key 配置（种子 Key，自动同步到 Redis）
# 生产环境建议通过 Redis 动态管理
api_keys:
  - key: "sk-gateway-dev-key-001"
    name: "dev-client-1"
  - key: "sk-gateway-dev-key-002"
    name: "dev-client-2"
